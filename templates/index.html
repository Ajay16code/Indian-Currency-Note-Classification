<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indian Currency Notes Detection</title>
  <link rel="stylesheet" type="text/css" href="../static/index.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script type="text/javascript" src="../static/index.js"></script>
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <main class="app-shell">
    <section class="card">
      <h1 class="title-wrap">Indian Currency Notes Detection</h1>
      <p class="subtitle">Upload a note image and get instant denomination detection using YOLO.</p>

      <div class="preview-wrap">
        <img id="imagebox" src="" alt="Preview of selected currency note" />
        <p id="preview-empty" class="preview-empty">No image selected yet</p>
      </div>

      <form class="controls" onsubmit="return false;">
        <label class="file-button" for="imageinput">Choose Image</label>
        <input id="imageinput" type="file" name="image" accept="image/*" onchange="readUrl(this)">
        <button name="send" id="sendbutton" type="button">Detect Note</button>
      </form>

      <p id="detected-output" class="detected-output" aria-live="polite"></p>
    </section>
  </main>
</body>
</html>
